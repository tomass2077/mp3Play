    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=HIGH
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=5
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DSPI_FREQUENCY=80000000
    -DSMOOTH_FONT=1
